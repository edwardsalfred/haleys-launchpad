<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0E23">
  <meta name="description" content="Haley's Launchpad — a self-paced, gamified 3rd grade course aligned to the Mississippi College- and Career-Readiness Standards.">
  <title>Haley's Launchpad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
  <!-- Animated starfield background -->
  <div class="starfield" aria-hidden="true">
    <div class="stars stars-sm"></div>
    <div class="stars stars-md"></div>
    <div class="stars stars-lg"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
  </div>

  <!-- App root: views render here -->
  <main id="app" aria-live="polite"></main>

  <!-- Bottom navigation (kid mode) -->
  <nav id="bottom-nav" class="bottom-nav hidden" aria-label="Main navigation">
    <button data-route="#/dashboard" class="nav-btn" aria-label="Home">
      <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
    </button>
    <button data-route="#/map/math" class="nav-btn" aria-label="Math Galaxy">
      <span class="nav-icon">🪐</span><span class="nav-label">Math</span>
    </button>
    <button data-route="#/map/ela" class="nav-btn" aria-label="Reading Galaxy">
      <span class="nav-icon">📖</span><span class="nav-label">Reading</span>
    </button>
    <button data-route="#/badges" class="nav-btn" aria-label="My badges">
      <span class="nav-icon">🏅</span><span class="nav-label">Badges</span>
    </button>
    <button data-route="#/parent-gate" class="nav-btn" aria-label="Grown-ups area">
      <span class="nav-icon">🔒</span><span class="nav-label">Grown-Ups</span>
    </button>
  </nav>

  <!-- Toast + overlay containers -->
  <div id="toast-root" aria-live="assertive"></div>
  <div id="overlay-root"></div>

  <!-- Supabase client (UMD build; app falls back to local demo mode if not configured) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- App config & core -->
  <script src="js/config.js"></script>

  <!-- Curriculum content (each file pushes units into window.COURSE_CONTENT) -->
  <script src="content/math-u1.js"></script>
  <script src="content/math-u2.js"></script>
  <script src="content/math-u3.js"></script>
  <script src="content/math-u4.js"></script>
  <script src="content/math-u5.js"></script>
  <script src="content/math-u6.js"></script>
  <script src="content/math-u7.js"></script>
  <script src="content/math-u8.js"></script>
  <script src="content/ela-r1.js"></script>
  <script src="content/ela-r2.js"></script>
  <script src="content/ela-r3.js"></script>
  <script src="content/ela-r4.js"></script>

  <script src="js/content-index.js"></script>
  <script src="js/store.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/gamify.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
